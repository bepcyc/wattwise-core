# wattwise-core CI — Forgejo Actions (self-host mirror, CI-R9/DELIV-R8).
#
# THIN SCHEDULER ONLY (CI-R0/CI-R9): every step is a single `just <recipe>` call,
# IDENTICAL to the GitHub Actions file (.github/workflows/ci.yml). The recipe set
# referenced here MUST equal the GitHub set — `just test-forge-portable`
# (CI-R1 item 18) fails the build if they diverge. Adding a gate to one forge's
# file REQUIRES adding it to the other.
#
# Path-scoping (issue #103) is mirrored from the GitHub file: the `changes` job
# no-ops the heavy DB-/build-bound STEPS on docs/text-only PRs. It is scheduling
# (which steps run), not gate logic (the recipes are untouched).
#
# Forgejo-specific plumbing (NOT gates):
#   * actions are referenced by full URL so the runner needs no GitHub mirror config;
#   * upload-artifact uses the PATCHED Forgejo fork — the upstream
#     actions/upload-artifact@v4 does NOT work on Forgejo (its v4 backend targets
#     the GitHub-only artifacts API; see code.forgejo.org/forgejo/upload-artifact);
#   * `scripts/ci_tools.sh` installs `just` (+ scanners where needed) exactly as on
#     GitHub, since the job containers ship without them.

name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]   # the v*-tag push triggers the release job (CI-R10/CI-R12)
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 2 * * *"   # nightly leg (CI-R4): live eval+smoke, deep fuzz (mutation nightly: nightly.yml)

env:
  UV_FROZEN: "1"
  PYTHON_VERSION: "3.13"

jobs:
  # ---------------------------------------------------------------- CHANGE SCOPE
  # Path-scoping (issue #103), IDENTICAL intent to the GitHub file. Heavy DB-/build-
  # bound tiers stay REQUIRED (their jobs always run + report); only their expensive
  # STEPS no-op when a PR touches docs/text ONLY. Never job-`if`-skip a required job.
  # Fail safe: skip_heavy is true ONLY for a pull_request whose EVERY changed path is
  # docs/text; any src/**, migrations/** (DDL), dep, Docker, or CI change runs the gate.
  changes:
    name: Detect change scope
    runs-on: docker
    outputs:
      skip_heavy: ${{ steps.decide.outputs.skip_heavy }}
    steps:
      - uses: https://github.com/dorny/paths-filter@v3
        id: filter
        # paths-filter needs a git checkout on push/tag events, and its output is
        # consumed ONLY for pull_request docs-only skipping (see `decide` below).
        # Gate it to PRs so push/tag runs don't fail with "not a git repository"
        # (git exit 128) and cascade-skip the heavy tiers + release. (CI-R / #106 fix)
        if: ${{ github.event_name == 'pull_request' }}
        with:
          predicate-quantifier: 'every'
          filters: |
            docs_only:
              - '**/*.md'
              - 'docs/**'
              - 'assets/**'
              - 'LICENSE'
              - 'NOTICE'
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.filter.outputs.docs_only }}" = "true" ]; then
            echo "skip_heavy=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_heavy=false" >> "$GITHUB_OUTPUT"
          fi

  # ----------------------------------------------------------------- FAST STAGE
  lint:
    name: Lint
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just lint            # CI-R1 item 1 + item 14
      - run: just fmt-check

  type-check:
    name: Type check
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just type            # CI-R1 item 2

  conventional-commits:
    name: Conventional commits
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just
      - run: just lint-commits     # CI-R1 item 15 (pure git/bash; no `just install` needed)

  precommit-config:
    name: Pre-commit config validity
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: uvx pre-commit validate-config   # CI-R1 item 19; uvx avoids a full `uv sync --all-extras`

  fast-tests:
    name: Fast tiers (unit+property+golden+contract+fuzz+logging)
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just test-fast-combined   # CI-R1 items 3 + 11 + 16 (issue #67)

  coverage:
    name: Coverage gate
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just cov              # CI-R1 item 5
      - uses: https://code.forgejo.org/forgejo/upload-artifact@v4   # CI-R6
        if: always()
        with: { name: coverage-report, path: reports/coverage.xml }

  agent-eval:
    name: Agent eval gate
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just eval             # CI-R1 item 6
      - uses: https://code.forgejo.org/forgejo/upload-artifact@v4   # CI-R6
        if: always()
        with: { name: eval-scorecard, path: reports/eval-scorecard.json }

  injection:
    name: Injection gate
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just test-inject      # CI-R1 item 7

  secret-and-dep-scan:
    name: Secret + dependency scan
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just gitleaks trivy
      - run: just install
      - run: just scan             # CI-R1 items 8 + 9 (secret scan + lockfile SCA)

  forge-portability:
    name: Forge portability
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just test-forge-portable   # CI-R1 item 18

  # ----------------------------------------------------------------- SLOW STAGE
  integration:
    name: Integration (T-INT)
    needs: [changes, lint, type-check, fast-tests]
    runs-on: docker
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wattwise
          POSTGRES_PASSWORD: wattwise
          POSTGRES_DB: wattwise
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U wattwise" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      WATTWISE_DATABASE_DSN: postgresql+asyncpg://wattwise:wattwise@postgres:5432/wattwise
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - name: Generate throwaway boot secrets (BOOT-R4; disposable per-run instance)
        if: needs.changes.outputs.skip_heavy != 'true'
        run: |
          ROOT_KEY="$(python3 -c 'import secrets,base64;print(base64.b64encode(secrets.token_bytes(32)).decode())')"
          SIGNING_KEY="$(python3 -c 'import secrets;print(secrets.token_hex(32))')"
          echo "::add-mask::$ROOT_KEY"
          echo "::add-mask::$SIGNING_KEY"
          echo "WATTWISE_ENCRYPTION_ROOT_KEY=$ROOT_KEY" >> "$GITHUB_ENV"
          echo "WATTWISE_TOKEN_SIGNING_KEY=$SIGNING_KEY" >> "$GITHUB_ENV"
      - run: just migrate
        if: needs.changes.outputs.skip_heavy != 'true'
      - run: just test-integration      # CI-R1 item 4
        if: needs.changes.outputs.skip_heavy != 'true'

  db-portability:
    name: Bootstrap & DB portability (SQLite+PostgreSQL+MariaDB)
    needs: [changes, lint, type-check, fast-tests]
    runs-on: docker
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wattwise
          POSTGRES_PASSWORD: wattwise
          POSTGRES_DB: wattwise
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U wattwise" --health-interval 5s
          --health-timeout 5s --health-retries 10
      mariadb:
        image: mariadb:11
        env:
          MARIADB_USER: wattwise
          MARIADB_PASSWORD: wattwise
          MARIADB_DATABASE: wattwise
          MARIADB_ROOT_PASSWORD: rootwattwise
        ports: ["53306:3306"]
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      WATTWISE_PG_DSN: postgresql+asyncpg://wattwise:wattwise@postgres:5432/wattwise
      WATTWISE_MARIADB_DSN: mysql+aiomysql://wattwise:wattwise@mariadb:3306/wattwise
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - name: Generate throwaway boot secrets (BOOT-R4; disposable per-run instance)
        if: needs.changes.outputs.skip_heavy != 'true'
        run: |
          ROOT_KEY="$(python3 -c 'import secrets,base64;print(base64.b64encode(secrets.token_bytes(32)).decode())')"
          SIGNING_KEY="$(python3 -c 'import secrets;print(secrets.token_hex(32))')"
          echo "::add-mask::$ROOT_KEY"
          echo "::add-mask::$SIGNING_KEY"
          echo "WATTWISE_ENCRYPTION_ROOT_KEY=$ROOT_KEY" >> "$GITHUB_ENV"
          echo "WATTWISE_TOKEN_SIGNING_KEY=$SIGNING_KEY" >> "$GITHUB_ENV"
      - name: Bootstrap acceptance (health endpoint serves)
        if: needs.changes.outputs.skip_heavy != 'true'
        run: |
          just migrate
          WATTWISE_DATABASE_DSN="sqlite+aiosqlite:///./.wattwise-ci.sqlite" \
            uv run uvicorn --factory wattwise_core.api.app:create_app \
            --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8000/healthz && break || sleep 1;
          done
          curl -fsS http://127.0.0.1:8000/healthz
      - run: just test-db-portable      # CI-R1 item 13
        if: needs.changes.outputs.skip_heavy != 'true'

  e2e:
    name: E2E smoke
    needs: [changes, lint, type-check, fast-tests]   # parallel with integration (each provisions its own DB)
    runs-on: docker
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wattwise
          POSTGRES_PASSWORD: wattwise
          POSTGRES_DB: wattwise
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U wattwise" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      WATTWISE_DATABASE_DSN: postgresql+asyncpg://wattwise:wattwise@postgres:5432/wattwise
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - name: Generate throwaway boot secrets (BOOT-R4; disposable per-run instance)
        if: needs.changes.outputs.skip_heavy != 'true'
        run: |
          ROOT_KEY="$(python3 -c 'import secrets,base64;print(base64.b64encode(secrets.token_bytes(32)).decode())')"
          SIGNING_KEY="$(python3 -c 'import secrets;print(secrets.token_hex(32))')"
          echo "::add-mask::$ROOT_KEY"
          echo "::add-mask::$SIGNING_KEY"
          echo "WATTWISE_ENCRYPTION_ROOT_KEY=$ROOT_KEY" >> "$GITHUB_ENV"
          echo "WATTWISE_TOKEN_SIGNING_KEY=$SIGNING_KEY" >> "$GITHUB_ENV"
      - run: just migrate
        if: needs.changes.outputs.skip_heavy != 'true'
      - run: just test-e2e              # CI-R1 item 12
        if: needs.changes.outputs.skip_heavy != 'true'

  # Advisory PR-stage mutation testing (T-MUT, issue #35 / ADR 0006): diff-scoped,
  # time-boxed, warm-started from the cached mutants/ dir. IDENTICAL recipe to the
  # GitHub file (CI-R9); cache/checkout-depth steps are runner plumbing, all gate
  # logic (diff scope, budget, in-script skip, report) lives in the recipe (CI-R0).
  mutation-advisory:
    name: Mutation advisory (T-MUT)
    if: github.event_name == 'pull_request'
    needs: [lint, type-check, fast-tests]
    runs-on: docker
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
        with: { fetch-depth: 0 }   # merge-base diff scoping needs main's history
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - uses: https://code.forgejo.org/actions/cache@v4   # mutant/verdict cache (issue #35 item 4)
        with:
          path: mutants
          key: tmut-v1-${{ hashFiles('uv.lock') }}-${{ github.run_id }}
          restore-keys: |
            tmut-v1-${{ hashFiles('uv.lock') }}-
            tmut-v1-
      - run: just test-mut-pr
      - uses: https://code.forgejo.org/forgejo/upload-artifact@v4   # CI-R6
        if: always()
        with: { name: mutation-pr-report, path: reports/ }

  image-scan-sbom:
    name: Container image scan + SBOM
    runs-on: docker
    needs: [changes, lint, type-check, fast-tests]
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just trivy syft
      - run: just install
      - run: just sbom                  # CI-R1 item 10 (CONT-R1: builds the image, no Critical + SBOM)
        if: needs.changes.outputs.skip_heavy != 'true'
      - uses: https://code.forgejo.org/forgejo/upload-artifact@v4   # CI-R6
        if: always() && needs.changes.outputs.skip_heavy != 'true'
        with: { name: image-scan-sbom, path: .scan/ }

  package-build:
    name: Package build & install-boot
    needs: [changes, lint, type-check, fast-tests]
    runs-on: docker
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just install-boot-check    # CI-R1 item 20
        if: needs.changes.outputs.skip_heavy != 'true'
      - uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        if: needs.changes.outputs.skip_heavy != 'true'
        with: { name: dist, path: dist/ }

  # ----------------------------------------------------------------- NIGHTLY (non-mutation)
  nightly:
    name: Nightly live eval + live smoke + deep fuzz (CI-R4)
    # CI-R4: live-mode T-EVAL + live-provider smoke + deep fuzz nightly, alerting on
    # regression (a red scheduled run is the forge's failure notification), without
    # blocking PRs. The nightly MUTATION campaign (T-MUT enforcing leg) is owned by the
    # dedicated nightly.yml scheduler (`just test-mut`) — kept out of here so there is
    # exactly ONE mutation gate across the workflows (issue #35 / ADR 0006 / TIER-R6).
    if: github.event_name == 'schedule'
    runs-on: docker
    env:
      WATTWISE_LLM_API_KEY: ${{ secrets.WATTWISE_LLM_API_KEY }}
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just eval-live          # QA-EVAL-R9 live mode + INFRA_ERROR gate (QA-EVAL-R12(b))
      - run: just test-llm           # live-provider smoke (CI-R4)
      - run: just test-fuzz-nightly  # TIER-R5 mode (b) extended campaign
      - uses: https://code.forgejo.org/forgejo/upload-artifact@v4   # CI-R6
        if: always()
        with: { name: nightly-reports, path: reports/ }

  # ----------------------------------------------------------------- RELEASE
  # FORGE_PROVIDER=forgejo selects the Forgejo release + its built-in OCI
  # registry (CI-R12). `just release` is identical to the GitHub job; only the
  # provider env differs (CI-R10: NO code change between forges). release.sh
  # derives the registry host + API base from GITHUB_SERVER_URL the runner sets.
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - lint
      - type-check
      - conventional-commits
      - precommit-config
      - fast-tests
      - coverage
      - agent-eval
      - injection
      - secret-and-dep-scan
      - forge-portability
      - integration
      - db-portability
      - e2e
      - image-scan-sbom
      - package-build
    runs-on: docker
    env:
      FORGE_PROVIDER: forgejo
      VERSION: ${{ github.ref_name }}   # the pushed v* tag drives release.sh
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: https://github.com/astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with: { python-version: "3.13" }
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: https://github.com/astral-sh/setup-uv@v8.2.0
        with: { python-version: "3.13" }
      - run: bash scripts/ci_tools.sh just trivy syft
      - name: Registry login (Forgejo OCI)
        run: |
          if [ -n "${FORGEJO_TOKEN:-}" ]; then
            echo "${FORGEJO_TOKEN}" | docker login "${GITHUB_SERVER_URL#*://}" \
              -u "${GITHUB_ACTOR}" --password-stdin
          else
            echo "FORGEJO_TOKEN unset — skipping registry login (release will fail at push)"
          fi
      - run: just install
      - run: just release               # CI-R10/CI-R12 (FORGE_PROVIDER=forgejo)
