# Runtime alembic configuration for the CONTAINER IMAGE (issue #19).
#
# The repository's alembic.ini assumes a source checkout (script_location relative to the
# working tree, `prepend_sys_path = src`). Inside the image the package is installed in
# the venv and the migration scripts are shipped at /app/migrations next to this file, so
# this variant resolves script_location via %(here)s — it works from any CWD with no
# source tree. Same revisions, same env.py: the database URL still comes ONLY from
# wattwise_core.config (WATTWISE_DATABASE_DSN; env / secret-manager only, BOOT-R4).

[alembic]
script_location = %(here)s/migrations
path_separator = os
# UTC, time-ordered, human-sortable revision filenames (parity with the repo config).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(rev)s_%%(slug)s
timezone = UTC

[post_write_hooks]
# No autoformat hooks: revisions are committed as authored.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
