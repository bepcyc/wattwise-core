# wattwise-core CI — GitHub Actions (primary forge, DELIV-R1).
#
# THIN SCHEDULER ONLY (CI-R0/CI-R9): every step is a single `just <recipe>` call.
# There is ZERO gate logic here — the Justfile is the single source of truth, so
# the command CI runs is the command a contributor runs locally. The Forgejo
# mirror (.forgejo/workflows/ci.yml) MUST reference the IDENTICAL recipe set
# (`just test-forge-portable`, CI-R1 item 18 / CI-R9 / DELIV-R8).
#
# Path-scoping (issue #103) is the one workflow-level decision that is NOT a gate:
# the `changes` job classifies the PR diff and the heavy DB-/build-bound steps
# no-op on docs/text-only PRs. It changes WHICH steps run (scheduling), never the
# pass/fail CRITERIA (the recipes are untouched), and it is mirrored on both forges.
#
# Runner plumbing (not gates): checkout, setup-uv, and `scripts/ci_tools.sh`,
# which installs `just` (NOT preinstalled on ubuntu-latest) and, where a job
# needs them, the scanner binaries (gitleaks/trivy/syft) from their official
# installers — identical on both forges so the tool set cannot diverge.
#
# Job names are the branch-protection required-check names (CI-R1, QUAL-R3).
# Staging (CI-R3): the `fast` jobs gate first and fail fast; the `slow` jobs
# (integration, db-portability, e2e, image-scan/SBOM, package-build) follow.

name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]   # the v*-tag push triggers the release job (CI-R10/CI-R12)
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 2 * * *"   # nightly leg (CI-R4): live eval+smoke, deep fuzz (mutation nightly: nightly.yml)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # uv installs from the frozen lockfile (CI-R5/RUN-R3.2); pin the runtime to 3.13.
  UV_FROZEN: "1"
  PYTHON_VERSION: "3.13"

jobs:
  # ---------------------------------------------------------------- CHANGE SCOPE
  # Path-scoping (issue #103). The heavy DB- and build-bound tiers below stay
  # REQUIRED checks — their JOBS always run and report green — but their expensive
  # STEPS no-op when a PR touches docs/text ONLY. We never job-level-`if`-skip a
  # required job (a skipped required check blocks the merge); we gate the costly
  # steps instead. Fail safe: skip_heavy is true ONLY for a pull_request whose
  # EVERY changed path is docs/text. Any src/**, migrations/** (DDL), dependency,
  # Docker, or CI/build change leaves skip_heavy=false and runs the full gate.
  changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    outputs:
      skip_heavy: ${{ steps.decide.outputs.skip_heavy }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # 'every': the filter matches only when EVERY changed file matches one
          # of its patterns — i.e. a genuine docs/text-only change. DDL lives in
          # migrations/** and is deliberately absent from the allow-list.
          predicate-quantifier: 'every'
          filters: |
            docs_only:
              - '**/*.md'
              - 'docs/**'
              - 'assets/**'
              - 'LICENSE'
              - 'NOTICE'
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.filter.outputs.docs_only }}" = "true" ]; then
            echo "skip_heavy=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_heavy=false" >> "$GITHUB_OUTPUT"
          fi

  # ----------------------------------------------------------------- FAST STAGE
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just lint            # CI-R1 item 1 + item 14 (lint-ast/content/novendor-sql/arch)
      - run: just fmt-check

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just type            # CI-R1 item 2 (mypy --strict)

  conventional-commits:
    name: Conventional commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }  # need the full PR commit range
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just lint-commits     # CI-R1 item 15

  precommit-config:
    name: Pre-commit config validity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: uv run pre-commit validate-config   # CI-R1 item 19 (CI-R11)

  fast-tests:
    name: Fast tiers (unit+property+golden+contract+fuzz+logging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - uses: actions/cache@v4
        with:
          path: .hypothesis
          # run_id in the key -> never an exact hit -> the refreshed example DB
          # is saved after EVERY run; restore-keys picks up the latest prior one.
          key: hypothesis-${{ github.run_id }}
          restore-keys: |
            hypothesis-
      - run: just test-fast-combined   # CI-R1 items 3 + 11 + 16 (issue #67)

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just cov              # CI-R1 item 5 (≥80% overall; analytics/adapter ≥90%)
      - uses: actions/upload-artifact@v4   # retained artifact (CI-R6)
        if: always()
        with: { name: coverage-report, path: reports/coverage.xml }

  agent-eval:
    name: Agent eval gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just eval             # CI-R1 item 6 (recorded-response mode)
      - uses: actions/upload-artifact@v4   # eval scorecard (CI-R6)
        if: always()
        with: { name: eval-scorecard, path: reports/eval-scorecard.json }

  injection:
    name: Injection gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just test-inject      # CI-R1 item 7

  secret-and-dep-scan:
    name: Secret + dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }   # secret scan over diff + history delta
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: |
            trivy-db-${{ runner.os }}-
      - run: bash scripts/ci_tools.sh just gitleaks trivy
      - run: just install
      - run: just scan             # CI-R1 items 8 + 9 (secret scan + lockfile SCA)

  forge-portability:
    name: Forge portability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just test-forge-portable   # CI-R1 item 18 (CI-R9/DELIV-R8)

  # ----------------------------------------------------------------- SLOW STAGE
  integration:
    name: Integration (T-INT)
    needs: [changes, lint, type-check, fast-tests]
    runs-on: ubuntu-latest
    services:
      # Ephemeral master store on a NON-DEFAULT host port (hermetic, TIER-R2).
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wattwise
          POSTGRES_PASSWORD: wattwise
          POSTGRES_DB: wattwise
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U wattwise" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      WATTWISE_DATABASE_DSN: postgresql+asyncpg://wattwise:wattwise@localhost:55432/wattwise
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - name: Generate throwaway boot secrets (BOOT-R4; disposable per-run instance)
        if: needs.changes.outputs.skip_heavy != 'true'
        run: |
          ROOT_KEY="$(python3 -c 'import secrets,base64;print(base64.b64encode(secrets.token_bytes(32)).decode())')"
          SIGNING_KEY="$(python3 -c 'import secrets;print(secrets.token_hex(32))')"
          echo "::add-mask::$ROOT_KEY"
          echo "::add-mask::$SIGNING_KEY"
          echo "WATTWISE_ENCRYPTION_ROOT_KEY=$ROOT_KEY" >> "$GITHUB_ENV"
          echo "WATTWISE_TOKEN_SIGNING_KEY=$SIGNING_KEY" >> "$GITHUB_ENV"
      - run: just migrate
        if: needs.changes.outputs.skip_heavy != 'true'
      - run: just test-integration      # CI-R1 item 4
        if: needs.changes.outputs.skip_heavy != 'true'

  db-portability:
    name: Bootstrap & DB portability (SQLite+PostgreSQL+MariaDB)
    needs: [changes, lint, type-check, fast-tests]
    runs-on: ubuntu-latest
    services:
      # 3-backend matrix on NON-DEFAULT host ports so nothing collides (TIER-R2).
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wattwise
          POSTGRES_PASSWORD: wattwise
          POSTGRES_DB: wattwise
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U wattwise" --health-interval 5s
          --health-timeout 5s --health-retries 10
      mariadb:
        image: mariadb:11
        env:
          MARIADB_USER: wattwise
          MARIADB_PASSWORD: wattwise
          MARIADB_DATABASE: wattwise
          MARIADB_ROOT_PASSWORD: rootwattwise
        ports: ["53306:3306"]
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      WATTWISE_PG_DSN: postgresql+asyncpg://wattwise:wattwise@localhost:55432/wattwise
      WATTWISE_MARIADB_DSN: mysql+aiomysql://wattwise:wattwise@localhost:53306/wattwise
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      # Bootstrap-acceptance (BOOT-R1, E4-T3): clean checkout -> migrate ->
      # health-serving instance. The bootstrap recipe runs uvicorn in the
      # foreground, so here we start it backgrounded, poll health, then tear down.
      - name: Generate throwaway boot secrets (BOOT-R4; disposable per-run instance)
        if: needs.changes.outputs.skip_heavy != 'true'
        run: |
          ROOT_KEY="$(python3 -c 'import secrets,base64;print(base64.b64encode(secrets.token_bytes(32)).decode())')"
          SIGNING_KEY="$(python3 -c 'import secrets;print(secrets.token_hex(32))')"
          echo "::add-mask::$ROOT_KEY"
          echo "::add-mask::$SIGNING_KEY"
          echo "WATTWISE_ENCRYPTION_ROOT_KEY=$ROOT_KEY" >> "$GITHUB_ENV"
          echo "WATTWISE_TOKEN_SIGNING_KEY=$SIGNING_KEY" >> "$GITHUB_ENV"
      - name: Bootstrap acceptance (health endpoint serves)
        if: needs.changes.outputs.skip_heavy != 'true'
        run: |
          just migrate
          WATTWISE_DATABASE_DSN="sqlite+aiosqlite:///./.wattwise-ci.sqlite" \
            uv run uvicorn --factory wattwise_core.api.app:create_app \
            --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8000/healthz && break || sleep 1;
          done
          curl -fsS http://127.0.0.1:8000/healthz
      - run: just test-db-portable      # CI-R1 item 13 (BOOT-R1/R2/R3)
        if: needs.changes.outputs.skip_heavy != 'true'

  e2e:
    name: E2E smoke
    needs: [changes, integration]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wattwise
          POSTGRES_PASSWORD: wattwise
          POSTGRES_DB: wattwise
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U wattwise" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      WATTWISE_DATABASE_DSN: postgresql+asyncpg://wattwise:wattwise@localhost:55432/wattwise
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - name: Generate throwaway boot secrets (BOOT-R4; disposable per-run instance)
        if: needs.changes.outputs.skip_heavy != 'true'
        run: |
          ROOT_KEY="$(python3 -c 'import secrets,base64;print(base64.b64encode(secrets.token_bytes(32)).decode())')"
          SIGNING_KEY="$(python3 -c 'import secrets;print(secrets.token_hex(32))')"
          echo "::add-mask::$ROOT_KEY"
          echo "::add-mask::$SIGNING_KEY"
          echo "WATTWISE_ENCRYPTION_ROOT_KEY=$ROOT_KEY" >> "$GITHUB_ENV"
          echo "WATTWISE_TOKEN_SIGNING_KEY=$SIGNING_KEY" >> "$GITHUB_ENV"
      - run: just migrate
        if: needs.changes.outputs.skip_heavy != 'true'
      - run: just test-e2e              # CI-R1 item 12
        if: needs.changes.outputs.skip_heavy != 'true'

  # Advisory PR-stage mutation testing (T-MUT, issue #35 / ADR 0006): diff-scoped,
  # time-boxed, warm-started from the cached mutants/ dir. continue-on-error keeps
  # it advisory at the forge level too — it can NEVER be the long pole that blocks
  # the merge. All gate logic (diff scope, budget, skip, report) lives in the
  # recipe (CI-R0); the cache + fetch-depth steps below are runner plumbing.
  mutation-advisory:
    name: Mutation advisory (T-MUT)
    if: github.event_name == 'pull_request'
    needs: [lint, type-check, fast-tests]
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }   # merge-base diff scoping needs main's history
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - uses: actions/cache@v4     # mutant/verdict/test-stats cache (issue #35 item 4)
        with:
          path: mutants
          key: tmut-v1-${{ hashFiles('uv.lock') }}-${{ github.run_id }}
          restore-keys: |
            tmut-v1-${{ hashFiles('uv.lock') }}-
            tmut-v1-
      - run: just test-mut-pr
      - uses: actions/upload-artifact@v4   # retained advisory report (CI-R6)
        if: always()
        with: { name: mutation-pr-report, path: reports/ }

  image-scan-sbom:
    name: Container image scan + SBOM
    needs: [changes, lint, type-check, fast-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: |
            trivy-db-${{ runner.os }}-
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true   # make `docker build` use the buildx container driver (gha cache export needs it)
      - name: Expose Actions cache runtime to run steps (type=gha cache auth)
        uses: crazy-max/ghaction-github-runtime@v3
      - run: bash scripts/ci_tools.sh just trivy syft
      - run: just install
      - run: just sbom                  # CI-R1 item 10 (CONT-R1: builds the image, no Critical + SBOM)
        if: needs.changes.outputs.skip_heavy != 'true'
        env:
          # --load: the container driver builds in an isolated BuildKit; load the
          # result into the local daemon so trivy/syft can scan the tag.
          WW_BUILDX_CACHE: "--cache-from=type=gha --cache-to=type=gha,mode=max --load"
      - uses: actions/upload-artifact@v4   # retained image-scan report + SBOM (CI-R6)
        if: always() && needs.changes.outputs.skip_heavy != 'true'
        with: { name: image-scan-sbom, path: .scan/ }

  package-build:
    name: Package build & install-boot
    needs: [changes, lint, type-check, fast-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just install-boot-check    # CI-R1 item 20 (uv build + boot from wheel)
        if: needs.changes.outputs.skip_heavy != 'true'
      - uses: actions/upload-artifact@v4
        if: needs.changes.outputs.skip_heavy != 'true'
        with: { name: dist, path: dist/ }

  # ----------------------------------------------------------------- NIGHTLY (non-mutation)
  nightly:
    name: Nightly live eval + live smoke + deep fuzz (CI-R4)
    # CI-R4: live-mode T-EVAL + live-provider smoke + deep fuzz nightly, alerting on
    # regression (a red scheduled run is the forge's failure notification), without
    # blocking PRs. The nightly MUTATION campaign (T-MUT enforcing leg) is owned by the
    # dedicated nightly.yml scheduler (`just test-mut`) — kept out of here so there is
    # exactly ONE mutation gate across the workflows (issue #35 / ADR 0006 / TIER-R6).
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      WATTWISE_LLM_API_KEY: ${{ secrets.WATTWISE_LLM_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - run: bash scripts/ci_tools.sh just
      - run: just install
      - run: just eval-live          # QA-EVAL-R9 live mode + INFRA_ERROR gate (QA-EVAL-R12(b))
      - run: just test-llm           # live-provider smoke (CI-R4)
      - run: just test-fuzz-nightly  # TIER-R5 mode (b) extended campaign
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: nightly-reports, path: reports/ }

  # ----------------------------------------------------------------- RELEASE
  # Tag-driven (CI-R10/CI-R12). The job is a thin scheduler: `just release` owns
  # the ordered steps (abort-on-red, build, changelog, SBOM, image push, forge
  # release, conditional PyPI publish). FORGE_PROVIDER selects GitHub here.
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - lint
      - type-check
      - conventional-commits
      - precommit-config
      - fast-tests
      - coverage
      - agent-eval
      - injection
      - secret-and-dep-scan
      - forge-portability
      - integration
      - db-portability
      - e2e
      - image-scan-sbom
      - package-build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # `gh release create` (CI-R10 step 6)
      packages: write   # push the release image to GHCR (CI-R12)
    env:
      FORGE_PROVIDER: github
      VERSION: ${{ github.ref_name }}          # the pushed v* tag drives release.sh
      WW_OWNER: ${{ github.repository_owner }} # GHCR namespace = repo owner
      # Publish tokens are injected as secrets; `just release` skips cleanly when
      # absent (CI-R10 step 6). Never baked into the image (SEC-R12).
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v8.2.0
        id: setup_uv
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
        continue-on-error: true   # issue #37: a transient fetch failure gets a retry, not a job failure
      - if: steps.setup_uv.outcome == 'failure'
        run: sleep 20
      - if: steps.setup_uv.outcome == 'failure'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-python: true
      - uses: docker/login-action@v3            # GHCR push auth (CI-R12)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true   # make `docker build` use the buildx container driver (gha cache export needs it)
      - name: Expose Actions cache runtime to run steps (type=gha cache auth)
        uses: crazy-max/ghaction-github-runtime@v3
      - run: bash scripts/ci_tools.sh just trivy syft
      - run: just install
      - run: just release               # CI-R10/CI-R12 (live in CI; FORGE_PROVIDER=github)
        env:
          # --load: scan/push read the tag from the local daemon (container driver
          # builds in an isolated BuildKit otherwise).
          WW_BUILDX_CACHE: "--cache-from=type=gha --cache-to=type=gha,mode=max --load"
