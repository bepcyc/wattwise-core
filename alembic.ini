# Alembic configuration for wattwise-core (GBO-R8b: portable, ORM-only).
#
# The database URL is NOT set here — env.py reads it from
# wattwise_core.config.get_settings().database_dsn (env / secret-manager only,
# BOOT-R4). The same revisions run unchanged on SQLite / PostgreSQL / MariaDB
# (only the DSN differs).

[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
# UTC, time-ordered, human-sortable revision filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(rev)s_%%(slug)s
timezone = UTC

[post_write_hooks]
# No autoformat hooks: revisions are committed as authored.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
